<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; padding: 30px; background: #fafafa; margin: 0; }
  .frame { max-width: 1500px; border: 1.5px solid #1E2761; border-radius: 8px; padding: 26px 30px; background: #ffffff; }
  .title { font-size: 22px; font-weight: 700; color: #1E2761; padding: 4px 4px 14px 4px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #CADCFC; margin-bottom: 14px; }
  .title .sub { font-size: 14px; font-weight: 400; color: #888; }
  svg { display: block; margin: 0 auto; font-family: 'Malgun Gothic', sans-serif; }
  .box { stroke-width: 1.8; }
  .label { font-size: 13px; font-weight: 600; pointer-events: none; }
  .label-bold { font-size: 14px; font-weight: 700; }
  .label-big { font-size: 16px; font-weight: 700; }
  .label-sub { font-size: 11px; font-weight: 400; fill: #555; }
  .arrow { fill: none; stroke: #555; stroke-width: 1.6; stroke-linecap: square; stroke-linejoin: miter; }
  .arrow-thick { fill: none; stroke: #2F6FB7; stroke-width: 2.2; stroke-linecap: square; stroke-linejoin: miter; }
  .arrow-faint { fill: none; stroke: #999; stroke-width: 1.2; stroke-dasharray: 4 3; stroke-linecap: square; stroke-linejoin: miter; }
  .stage-divider { stroke: #B0BEC5; stroke-width: 1.2; stroke-dasharray: 8 5; }
  .stage-label { font-size: 16px; font-weight: 700; fill: #1E2761; letter-spacing: 0.5px; }
  .stage-num { font-size: 22px; font-weight: 800; fill: #F96167; }
  .emoji { font-size: 30px; }
  .ref-note { font-size: 10px; fill: #888; font-style: italic; }
</style>
</head>
<body>

<div class="frame">
  <div class="title">
    <span>다국어 자동 더빙 시스템 — Pipeline</span>
    <span class="sub">6 단계 · 12 모델</span>
  </div>

<svg width="1440" height="1640" viewBox="0 0 1440 1640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555" />
    </marker>
    <marker id="ahb" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F6FB7" />
    </marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999" />
    </marker>
  </defs>

  <!-- ============================================== -->
  <!-- STAGE 0: 입력 (top center) -->
  <!-- ============================================== -->
  <rect class="box" x="600" y="40" width="240" height="90" rx="14" ry="14" fill="#FFCDD2" stroke="#C62828" stroke-width="2.5"/>
  <text x="720" y="72" class="emoji" text-anchor="middle">🎬</text>
  <text x="720" y="103" class="label-big" text-anchor="middle">입력 영상 (video.mp4)</text>
  <text x="720" y="120" class="label-sub" text-anchor="middle">25fps · stereo audio</text>

  <!-- Video → ffmpeg (Manhattan: V down, H left, V down) -->
  <path class="arrow" d="M 720 130 V 200 H 100 V 280" marker-end="url(#ah)"/>

  <!-- ============================================== -->
  <!-- DIVIDER + STAGE 1 -->
  <!-- ============================================== -->
  <line x1="40" y1="170" x2="1400" y2="170" class="stage-divider"/>
  <text x="55" y="196" class="stage-num">①</text>
  <text x="92" y="196" class="stage-label">오디오 분리</text>
  <text x="245" y="196" class="label-sub">영상 → 보컬과 BGM 분리</text>

  <!-- Stage 1 boxes (모두 같은 row, y=280~360) -->
  <!-- ffmpeg -->
  <rect class="box" x="50"  y="280" width="100" height="60" rx="8"  ry="8"  fill="#FFF59D" stroke="#F9A825"/>
  <text x="100" y="316" class="label-bold" text-anchor="middle">ffmpeg</text>

  <!-- Image Frame (Stage 1 좌측 두번째, video → image frame) -->
  <rect class="box" x="190" y="280" width="160" height="60" rx="10" ry="10" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="270" y="304" class="label-bold" text-anchor="middle">Image Frame</text>
  <text x="270" y="324" class="label-sub" text-anchor="middle">25fps · 1080p</text>

  <!-- BS-Roformer (center) -->
  <rect class="box" x="400" y="270" width="180" height="80" rx="12" ry="12" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2"/>
  <text x="490" y="298" class="label-big" text-anchor="middle">BS-Roformer</text>
  <text x="490" y="320" class="label-sub" text-anchor="middle">vocal / BGM 분리</text>
  <text x="490" y="338" class="label-sub" text-anchor="middle">(음악 분리 모델)</text>

  <!-- BGM (top branch) -->
  <rect class="box" x="630" y="250" width="160" height="50" rx="10" ry="10" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="710" y="270" class="label-bold" text-anchor="middle">Background Sound</text>
  <text x="710" y="288" class="label-sub" text-anchor="middle">(BGM · 효과음)</text>

  <!-- Character Voice (bottom branch) -->
  <rect class="box" x="630" y="320" width="160" height="50" rx="10" ry="10" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="710" y="340" class="label-bold" text-anchor="middle">Character Voice</text>
  <text x="710" y="358" class="label-sub" text-anchor="middle">(보컬)</text>

  <!-- Silero VAD -->
  <rect class="box" x="830" y="320" width="160" height="50" rx="10" ry="10" fill="#C8E6C9" stroke="#2E7D32"/>
  <text x="910" y="340" class="label-bold" text-anchor="middle">Silero VAD</text>
  <text x="910" y="358" class="label-sub" text-anchor="middle">묵음 제거</text>

  <!-- Clean Vocals -->
  <rect class="box" x="1030" y="320" width="160" height="50" rx="10" ry="10" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="1110" y="340" class="label-bold" text-anchor="middle">Clean Vocals</text>
  <text x="1110" y="358" class="label-sub" text-anchor="middle">발화 구간만</text>

  <!-- Stage 1 화살표 (모두 직각) -->
  <!-- ffmpeg → Image Frame -->
  <path class="arrow" d="M 150 310 H 190" marker-end="url(#ah)"/>
  <!-- Image Frame → BS-Roformer -->
  <path class="arrow" d="M 350 310 H 400" marker-end="url(#ah)"/>
  <!-- BS-Roformer → BGM (top branch) -->
  <path class="arrow" d="M 580 295 H 610 V 275 H 630" marker-end="url(#ah)"/>
  <!-- BS-Roformer → Voice (bottom branch) -->
  <path class="arrow" d="M 580 325 H 610 V 345 H 630" marker-end="url(#ah)"/>
  <!-- Voice → Silero VAD -->
  <path class="arrow" d="M 790 345 H 830" marker-end="url(#ah)"/>
  <!-- Silero VAD → Clean Vocals -->
  <path class="arrow" d="M 990 345 H 1030" marker-end="url(#ah)"/>

  <!-- ============================================== -->
  <!-- DIVIDER + STAGE 2 -->
  <!-- ============================================== -->
  <line x1="40" y1="410" x2="1400" y2="410" class="stage-divider"/>
  <text x="55" y="436" class="stage-num">②</text>
  <text x="92" y="436" class="stage-label">보컬 분석 (4개 모델 병렬)</text>
  <text x="427" y="436" class="label-sub">전사 / 화자 분리 / 감정 / Active Speaker</text>

  <!-- Stage 2: 4 models row, y=475~545 -->
  <rect class="box" x="60"  y="475" width="160" height="75" rx="12" ry="12" fill="#C8E6C9" stroke="#2E7D32"/>
  <text x="140" y="503" class="label-big" text-anchor="middle">Qwen3-ASR</text>
  <text x="140" y="525" class="label-sub" text-anchor="middle">전사 (받아쓰기)</text>
  <text x="140" y="540" class="label-sub" text-anchor="middle">daemon :8902</text>

  <rect class="box" x="260" y="475" width="200" height="75" rx="12" ry="12" fill="#C8E6C9" stroke="#2E7D32"/>
  <text x="360" y="503" class="label-big" text-anchor="middle">DiariZen + ECAPA</text>
  <text x="360" y="525" class="label-sub" text-anchor="middle">화자 분리 + 임베딩</text>
  <text x="360" y="540" class="label-sub" text-anchor="middle">daemon :8903</text>

  <rect class="box" x="500" y="475" width="180" height="75" rx="12" ry="12" fill="#C8E6C9" stroke="#2E7D32"/>
  <text x="590" y="503" class="label-big" text-anchor="middle">emotion2vec+</text>
  <text x="590" y="525" class="label-sub" text-anchor="middle">감정 추출</text>
  <text x="590" y="540" class="label-sub" text-anchor="middle">Sad/Angry/Happy/...</text>

  <rect class="box" x="720" y="475" width="170" height="75" rx="12" ry="12" fill="#C8E6C9" stroke="#2E7D32"/>
  <text x="805" y="503" class="label-big" text-anchor="middle">LightASD</text>
  <text x="805" y="522" class="label-sub" text-anchor="middle">Active Speaker Det.</text>
  <text x="805" y="540" class="ref-note" text-anchor="middle">(영상 정보 사용)</text>

  <!-- Stage 2: 결과 박스 row, y=580~625 -->
  <rect class="box" x="60"  y="580" width="160" height="48" rx="8" ry="8" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="140" y="599" class="label" text-anchor="middle">Text Script (ENG)</text>
  <text x="140" y="617" class="label-sub" text-anchor="middle">+ word timestamp</text>

  <rect class="box" x="260" y="580" width="200" height="48" rx="8" ry="8" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="360" y="599" class="label" text-anchor="middle">Speaker Turns</text>
  <text x="360" y="617" class="label-sub" text-anchor="middle">(누가 · 언제)</text>

  <rect class="box" x="500" y="580" width="180" height="48" rx="8" ry="8" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="590" y="599" class="label" text-anchor="middle">Emotion List</text>
  <text x="590" y="617" class="label-sub" text-anchor="middle">감정 라벨</text>

  <rect class="box" x="720" y="580" width="170" height="48" rx="8" ry="8" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="805" y="599" class="label" text-anchor="middle">Active Speaker</text>
  <text x="805" y="617" class="label-sub" text-anchor="middle">per-frame target</text>

  <!-- Stage 1 → Stage 2 화살표: Clean Vocals → 4 모델 -->
  <!-- Clean Vocals bottom center에서 시작, 라벨 영역 아래(y=455)로 H 라인 -->
  <path class="arrow" d="M 1110 370 V 455 H 140 V 475" marker-end="url(#ah)"/>
  <path class="arrow" d="M 1110 370 V 455 H 360 V 475" marker-end="url(#ah)"/>
  <path class="arrow" d="M 1110 370 V 455 H 590 V 475" marker-end="url(#ah)"/>

  <!-- 모델 → 결과 (V down) -->
  <path class="arrow" d="M 140 550 V 580" marker-end="url(#ah)"/>
  <path class="arrow" d="M 360 550 V 580" marker-end="url(#ah)"/>
  <path class="arrow" d="M 590 550 V 580" marker-end="url(#ah)"/>
  <path class="arrow" d="M 805 550 V 580" marker-end="url(#ah)"/>

  <!-- ============================================== -->
  <!-- DIVIDER + STAGE 3 -->
  <!-- ============================================== -->
  <line x1="40" y1="670" x2="1400" y2="670" class="stage-divider"/>
  <text x="55" y="696" class="stage-num">③</text>
  <text x="92" y="696" class="stage-label">Reference 선택 + 한국어 번역</text>
  <text x="500" y="696" class="label-sub">화자별 최적 reference 자동 선택 + lip-sync 길이 맞춰 번역</text>

  <!-- Stage 3: y=730~870 -->
  <rect class="box" x="280" y="730" width="200" height="75" rx="12" ry="12" fill="#C8E6C9" stroke="#2E7D32"/>
  <text x="380" y="758" class="label-big" text-anchor="middle">MOS Evaluator</text>
  <text x="380" y="780" class="label-sub" text-anchor="middle">화자별 음성 품질 평가</text>
  <text x="380" y="798" class="label-sub" text-anchor="middle">(wav2vec2 fine-tuning)</text>

  <rect class="box" x="540" y="730" width="200" height="75" rx="12" ry="12" fill="#FFF59D" stroke="#F9A825" stroke-width="2.5"/>
  <text x="640" y="758" class="label-big" text-anchor="middle">GPT 5.4</text>
  <text x="640" y="780" class="label-sub" text-anchor="middle">영-한 번역 (Cloud API)</text>
  <text x="640" y="798" class="label-sub" text-anchor="middle">+ syllable 길이 가이드</text>

  <rect class="box" x="280" y="830" width="200" height="50" rx="8" ry="8" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="380" y="850" class="label-bold" text-anchor="middle">Reference Wav</text>
  <text x="380" y="868" class="label-sub" text-anchor="middle">SPEAKER_xx_Emotion.wav</text>

  <rect class="box" x="540" y="830" width="200" height="50" rx="8" ry="8" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="640" y="850" class="label-bold" text-anchor="middle">Text Script (KOR)</text>
  <text x="640" y="868" class="label-sub" text-anchor="middle">한국어 번역</text>

  <!-- Speakers → MOS (직각, 라벨 영역 아래 y=710) -->
  <path class="arrow" d="M 360 628 V 710 H 380 V 730" marker-end="url(#ah)"/>
  <!-- Text(ENG) → GPT (Stage 2 좌측 결과 → Stage 3 GPT) -->
  <path class="arrow" d="M 140 628 V 715 H 580 V 730" marker-end="url(#ah)"/>
  <!-- Emotion List → GPT (위에서) -->
  <path class="arrow" d="M 590 628 V 715 H 700 V 730" marker-end="url(#ah)"/>

  <!-- MOS → Reference, GPT → Text(KOR) -->
  <path class="arrow" d="M 380 805 V 830" marker-end="url(#ah)"/>
  <path class="arrow" d="M 640 805 V 830" marker-end="url(#ah)"/>

  <!-- ============================================== -->
  <!-- DIVIDER + STAGE 4 -->
  <!-- ============================================== -->
  <line x1="40" y1="920" x2="1400" y2="920" class="stage-divider"/>
  <text x="55" y="946" class="stage-num">④</text>
  <text x="92" y="946" class="stage-label">한국어 음성 합성 (Voice Cloning)</text>
  <text x="540" y="946" class="label-sub">화자별 reference로 한국어 합성 + 감정 적용</text>

  <!-- CosyVoice3 -->
  <rect class="box" x="480" y="980" width="280" height="115" rx="14" ry="14" fill="#B3E5FC" stroke="#0277BD" stroke-width="2.5"/>
  <text x="620" y="1012" class="label-big" text-anchor="middle" style="font-size:18px">CosyVoice3</text>
  <text x="620" y="1035" class="label-sub" text-anchor="middle">Zero-shot Voice Cloning</text>
  <text x="620" y="1055" class="label-sub" text-anchor="middle">cross-lingual 합성</text>
  <text x="620" y="1078" class="label-sub" text-anchor="middle">daemon :8901 · 24kHz 출력</text>

  <!-- Voice (KOR) -->
  <rect class="box" x="820" y="1010" width="200" height="60" rx="10" ry="10" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="920" y="1032" class="label-bold" text-anchor="middle">Character Voice (KOR)</text>
  <text x="920" y="1052" class="label-sub" text-anchor="middle">한국어 더빙 음성</text>

  <!-- 입력 화살표 (Stage 3 → Stage 4) -->
  <!-- Reference → CosyVoice3 (직각, 박스 위 spacing) -->
  <path class="arrow-thick" d="M 380 880 V 960 H 560 V 980" marker-end="url(#ahb)"/>
  <!-- Text(KOR) → CosyVoice3 -->
  <path class="arrow-thick" d="M 640 880 V 960 H 620 V 980" marker-end="url(#ahb)"/>
  <!-- Emotion List → CosyVoice3 (GPT 박스 우회, 우측으로 돌아 진입) -->
  <path class="arrow-thick" d="M 590 628 V 720 H 850 V 970 H 700 V 980" marker-end="url(#ahb)"/>

  <!-- CosyVoice3 → Voice(KOR) -->
  <path class="arrow" d="M 760 1040 H 820" marker-end="url(#ah)"/>

  <!-- ============================================== -->
  <!-- DIVIDER + STAGE 5 -->
  <!-- ============================================== -->
  <line x1="40" y1="1130" x2="1400" y2="1130" class="stage-divider"/>
  <text x="55" y="1156" class="stage-num">⑤</text>
  <text x="92" y="1156" class="stage-label">영상 결합 + 립싱크 + 화질 복원</text>
  <text x="540" y="1156" class="label-sub">한국어 발음에 입모양 동기화 → 얼굴 화질 복원</text>

  <!-- LatentSync -->
  <rect class="box" x="380" y="1190" width="240" height="115" rx="14" ry="14" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2"/>
  <text x="500" y="1222" class="label-big" text-anchor="middle" style="font-size:17px">LatentSync 1.6</text>
  <text x="500" y="1245" class="label-sub" text-anchor="middle">+ Korean LoRA</text>
  <text x="500" y="1265" class="label-sub" text-anchor="middle">VAE diffusion (DDIM 20)</text>
  <text x="500" y="1285" class="label-sub" text-anchor="middle">입모양 동기화</text>

  <!-- GFPGAN -->
  <rect class="box" x="680" y="1200" width="200" height="95" rx="12" ry="12" fill="#C8E6C9" stroke="#2E7D32"/>
  <text x="780" y="1232" class="label-big" text-anchor="middle" style="font-size:17px">GFPGAN v1.4</text>
  <text x="780" y="1257" class="label-sub" text-anchor="middle">얼굴 화질 복원</text>
  <text x="780" y="1277" class="label-sub" text-anchor="middle">2x upscale (async I/O)</text>

  <!-- 우측 입력 (참조 박스 - Stage 1에서 재사용) -->
  <rect class="box" x="1060" y="1190" width="200" height="50" rx="8" ry="8" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="1160" y="1210" class="label-bold" text-anchor="middle">Image Frame ↑</text>
  <text x="1160" y="1228" class="ref-note" text-anchor="middle">Stage ① 재사용</text>

  <rect class="box" x="1060" y="1258" width="200" height="50" rx="8" ry="8" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="1160" y="1278" class="label-bold" text-anchor="middle">Background Sound ↑</text>
  <text x="1160" y="1296" class="ref-note" text-anchor="middle">Stage ① 재사용</text>

  <!-- Voice(KOR) → LatentSync (직각, top center 진입) -->
  <path class="arrow" d="M 920 1070 V 1180 H 500 V 1190" marker-end="url(#ah)"/>
  <!-- Image Frame ref → LatentSync (top edge에서 출발, top right 진입) -->
  <path class="arrow-faint" d="M 1160 1190 V 1175 H 580 V 1190" marker-end="url(#ahg)"/>
  <!-- LatentSync → GFPGAN -->
  <path class="arrow" d="M 620 1247 H 680" marker-end="url(#ah)"/>

  <!-- ============================================== -->
  <!-- DIVIDER + STAGE 6 -->
  <!-- ============================================== -->
  <line x1="40" y1="1340" x2="1400" y2="1340" class="stage-divider"/>
  <text x="55" y="1366" class="stage-num">⑥</text>
  <text x="92" y="1366" class="stage-label">최종 출력 (한국어 더빙 영상)</text>

  <!-- ffmpeg mix -->
  <rect class="box" x="430" y="1400" width="160" height="60" rx="10" ry="10" fill="#FFF59D" stroke="#F9A825"/>
  <text x="510" y="1424" class="label-bold" text-anchor="middle">ffmpeg mix</text>
  <text x="510" y="1444" class="label-sub" text-anchor="middle">EBU R128 loudnorm</text>

  <!-- 최종 영상 -->
  <rect class="box" x="650" y="1380" width="320" height="100" rx="14" ry="14" fill="#FFCDD2" stroke="#C62828" stroke-width="2.5"/>
  <text x="810" y="1414" class="emoji" text-anchor="middle">🎬</text>
  <text x="810" y="1444" class="label-big" text-anchor="middle">한국어 더빙 영상 (.mp4)</text>
  <text x="810" y="1462" class="label-sub" text-anchor="middle">+ JSON 리포트 (segment별)</text>

  <!-- GFPGAN → ffmpeg mix (박스 위 충분한 spacing) -->
  <path class="arrow" d="M 780 1295 V 1360 H 510 V 1400" marker-end="url(#ah)"/>
  <!-- BGM ref → ffmpeg mix (bottom center에서 출발, 박스 위 spacing) -->
  <path class="arrow-faint" d="M 1160 1308 V 1360 H 510 V 1400" marker-end="url(#ahg)"/>
  <!-- ffmpeg mix → 최종 -->
  <path class="arrow" d="M 590 1430 H 650" marker-end="url(#ah)"/>

  <!-- ============================================== -->
  <!-- 범례 -->
  <!-- ============================================== -->
  <g transform="translate(40, 1570)">
    <rect width="14" height="14" rx="3" fill="#FFCDD2" stroke="#C62828" stroke-width="2"/>
    <text x="22" y="11" class="label-sub">입력 / 출력</text>
    <rect x="110" width="14" height="14" rx="3" fill="#C8E6C9" stroke="#2E7D32"/>
    <text x="132" y="11" class="label-sub">AI 모델</text>
    <rect x="200" width="14" height="14" rx="3" fill="#FFF59D" stroke="#F9A825"/>
    <text x="222" y="11" class="label-sub">도구 / Cloud API</text>
    <rect x="340" width="14" height="14" rx="3" fill="#B3E5FC" stroke="#0277BD" stroke-width="2"/>
    <text x="362" y="11" class="label-sub">TTS (CosyVoice3)</text>
