# LatentSync stage2 — RTX 5080 14GB VRAM 최적화 smoke test v2
# 핵심 변경:
#   - pixel_space_supervise: false  → VAE decode 단계 제거 (~3-4GB 절약)
#   - num_frames: 4  → 시퀀스 길이 절반 (~2GB 절약)
#   - perceptual_loss_weight: 0  → LPIPS 모델 로드 안 함
#   - max_train_steps: 10  → 안정성 검증 (10 step)
# 트레이드오프: latent space recon loss만으로 학습 → light fine-tune 적합
data:
  syncnet_config_path: configs/syncnet/syncnet_16_pixel_attn.yaml
  train_output_dir: /workspace/media/training_outputs/smoke_v2
  train_fileslist: ""
  train_data_dir: /workspace/media/training_data
  audio_embeds_cache_dir: /workspace/media/audio_cache/embeds
  audio_mel_cache_dir: /workspace/media/audio_cache/mel

  val_video_path: assets/demo1_video.mp4
  val_audio_path: assets/demo1_audio.wav
  batch_size: 1
  num_workers: 2
  num_frames: 2              # ⚠️ 4 → 2 (메모리 추가 절감)
  resolution: 256
  mask_image_path: latentsync/utils/mask.png
  audio_sample_rate: 16000
  video_fps: 25
  audio_feat_length: [2, 2]

ckpt:
  resume_ckpt_path: checkpoints/latentsync_unet.pt
  save_ckpt_steps: 100000

run:
  pixel_space_supervise: false   # ⚠️ KEY: VAE decode 스킵 → 큰 메모리 절감
  use_syncnet: false
  sync_loss_weight: 0.0
  perceptual_loss_weight: 0.0    # LPIPS off
  recon_loss_weight: 1
  guidance_scale: 1.5
  trepa_loss_weight: 0
  inference_steps: 20
  trainable_modules:
    - motion_modules.
    - attn2.
  seed: 1247
  use_mixed_noise: true
  mixed_noise_alpha: 1
  mixed_precision_training: true
  enable_gradient_checkpointing: true
  max_train_steps: 1000          # ⚠️ 장기 안정성 검증 (~13분 예상)
  max_train_epochs: -1

optimizer:
  lr: 1e-5
  scale_lr: false
  max_grad_norm: 1.0
  lr_scheduler: constant
  lr_warmup_steps: 0
  use_8bit_adam: true   # ⚠️ NEW: bitsandbytes AdamW8bit (optimizer state ~75% 절감)

model:
  act_fn: silu
  add_audio_layer: true
  attention_head_dim: 8
  block_out_channels: [320, 640, 1280, 1280]
  center_input_sample: false
  cross_attention_dim: 384
  down_block_types:
    [
      "CrossAttnDownBlock3D",
      "CrossAttnDownBlock3D",
      "CrossAttnDownBlock3D",
      "DownBlock3D",
    ]
  mid_block_type: UNetMidBlock3DCrossAttn
  up_block_types:
    [
      "UpBlock3D",
      "CrossAttnUpBlock3D",
      "CrossAttnUpBlock3D",
      "CrossAttnUpBlock3D",
    ]
  downsample_padding: 1
  flip_sin_to_cos: true
  freq_shift: 0
  in_channels: 13
  layers_per_block: 2
  mid_block_scale_factor: 1
  norm_eps: 1e-5
  norm_num_groups: 32
  out_channels: 4
  sample_size: 64
  resnet_time_scale_shift: default

  use_motion_module: true
  motion_module_resolutions: [1, 2, 4, 8]
  motion_module_mid_block: false
  motion_module_decoder_only: true
  motion_module_type: Vanilla
  motion_module_kwargs:
    num_attention_heads: 8
    num_transformer_block: 1
    attention_block_types:
      - Temporal_Self
      - Temporal_Self
    temporal_position_encoding: true
    temporal_position_encoding_max_len: 24
    temporal_attention_dim_div: 1
    zero_initialize: true
